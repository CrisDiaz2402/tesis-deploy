networks:
  tesis-net:
    driver: bridge

volumes:
  postgres_data:
  qdrant_storage:
  redis_data:
  hf_models_cache:
  documents_local:

services:

  postgres:
    image: postgres:16-alpine
    container_name: tesis-postgres
    restart: unless-stopped
    networks: [tesis-net]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: tesis-qdrant
    restart: unless-stopped
    networks: [tesis-net]
    ports:
      - "6334:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: tesis-redis
    restart: unless-stopped
    networks: [tesis-net]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  vllm:
    image: vllm/vllm-openai:latest
    container_name: tesis-vllm
    restart: unless-stopped
    networks: [tesis-net]
    ports:
      - "8001:8001"
    volumes:
      - hf_models_cache:/root/.cache/huggingface
    environment:
      TRANSFORMERS_OFFLINE: "0"
      HF_DATASETS_OFFLINE: "0"
      PYTORCH_ALLOC_CONF: "expandable_segments:True"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      Qwen/Qwen2.5-3B-Instruct-AWQ
        --served-model-name llama3-local
        --port 8001
        --host 0.0.0.0
        --quantization awq
        --max-model-len 2048
        --gpu-memory-utilization 0.90
        --max-num-seqs 4
        --max-num-batched-tokens 2048
        --enable-prefix-caching

  backend:
    build:
      context: ./Proyecto-tesis-backend
      dockerfile: Dockerfile.backend
    container_name: tesis-backend
    restart: unless-stopped
    networks: [tesis-net]
    ports:
      - "8000:8000"
    volumes:
      - ./Proyecto-tesis-backend:/app
      - documents_local:/app/documents_local
    env_file:
      - ./Proyecto-tesis-backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./Proyecto-tesis-Frontend
      dockerfile: Dockerfile.frontend
    container_name: tesis-frontend
    restart: unless-stopped
    networks: [tesis-net]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend